<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>里维斯 · AI 工具教程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
    background: #F5F0EB; color: #1A1A2E; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px 40px;
  }
  .container { max-width: 640px; width: 100%; }
  .logo { font-size: 28px; font-weight: 800; margin-bottom: 6px; color: #2D1B69; }
  .tagline { font-size: 15px; color: #8A8A9E; margin-bottom: 40px; }
  .card {
    background: #FFF9F0; border-radius: 16px; padding: 24px;
    margin-bottom: 16px; border: 1px solid #EDE8E0;
    transition: all 0.25s ease; cursor: pointer;
    display: flex; align-items: center; gap: 18px;
    text-decoration: none; color: inherit;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124,92,252,0.10);
    border-color: rgba(124,92,252,0.25);
  }
  .card .icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .card .icon.cc { background: linear-gradient(135deg, #FF6B35, #7C5CFC); color: #fff; }
  .card .icon.mx { background: linear-gradient(135deg, #2ECC71, #1ABC9C); color: #fff; }
  .card .info h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card .info p { font-size: 14px; color: #8A8A9E; line-height: 1.5; }
  .card .arrow { margin-left: auto; color: #C8C4BE; font-size: 20px; flex-shrink: 0; }
  .footer { margin-top: 40px; font-size: 13px; color: #B8B4AE; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">里维斯 · AI</div>
  <div class="tagline">用AI提升效率，而不是被AI替代</div>

  <a class="card" href="/claude-code-tutorial/">
    <div class="icon cc">CC</div>
    <div class="info">
      <h3>Claude Code + DeepSeek V4 教程</h3>
      <p>Windows 安装配置 · 国内网络直连 · 全部命令可复制</p>
    </div>
    <div class="arrow">→</div>
  </a>

  <a class="card" href="/mx-shell-tutorial/">
    <div class="icon mx">MX</div>
    <div class="info">
      <h3>Mx-Shell AI 短片创作</h3>
      <p>从剧本到视频 · AI 短片全流程操作手册</p>
    </div>
    <div class="arrow">→</div>
  </a>

  <div class="footer">持续更新中 · 关注「里维斯」解锁更多AI工具</div>
</div>
</body>
</html>
